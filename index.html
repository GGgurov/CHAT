<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat With Border</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: #000; /* Цвет фона за рамкой */
            overflow: hidden;
        }

        /* Контейнер рамки */
        #border-box {
            width: 100vw;
            height: 90vh;
            /* Красивый переливающийся градиент */
            background-size: 400% 400%;
            animation: gradientBG 5s ease infinite;
            
            /* Создаем отступы для внутреннего блока */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Контейнер чата (внутри рамки) */
        #chat-wrapper {
            width: calc(100% - 10px); /* Минус 10px (по 5px с каждой стороны) */
            height: calc(100% - 10px);
            background-color: #000; /* Цвет фона под чатом */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div id="border-box">
        <div id="chat-wrapper">
            <iframe 
                src="https://tikfinity.zerody.one/widget/chat?cid=2916765" 
                id="chat-frame"
                allowtransparency="true">
            </iframe>
        </div>
    </div>

</body>
</html>
