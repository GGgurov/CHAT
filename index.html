<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Fix</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: transparent;
        }

        #wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            /* Убираем flex-end, чтобы виджет начинался с верхней точки */
            display: block; 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Позволяем содержимому iframe скроллиться внутри, если виджет это поддерживает */
            overflow-y: auto; 
        }
    </style>
</head>
<body>

    <div id="wrapper">
        <iframe 
            src="https://tikfinity.zerody.one/widget/chat?cid=2916765" 
            id="chat-frame"
            allowtransparency="true">
        </iframe>
    </div>

    <script>
        const frame = document.getElementById('chat-frame');

        // Скрипт принудительной прокрутки через манипуляцию DOM внутри iframe
        setInterval(() => {
            try {
                const innerDoc = frame.contentDocument || frame.contentWindow.document;
                // Ищем основной контейнер с сообщениями (обычно это body или div с классом)
                // Если скролл есть у самого окна фрейма:
                frame.contentWindow.scrollTo(0, frame.contentWindow.document.body.scrollHeight);
            } catch (e) {
                // Из-за настроек безопасности браузера, доступ к внутренностям 
                // другого сайта может быть ограничен (CORS).
            }
        }, 1000);
    </script>
</body>
</html>
